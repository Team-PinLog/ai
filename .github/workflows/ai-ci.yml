name: ai-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ai-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ai-ci / check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # PR 제목만 검증(squash 병합이라 제목이 최종 커밋 메시지가 된다).
      # 형식 보증이지 티켓 존재 보증은 아니다(수용).
      - name: Validate PR title
        if: github.event_name == 'pull_request'
        run: |
          echo "${{ github.event.pull_request.title }}" | \
            grep -qE '^(feat|fix|docs|chore|refactor|test|perf)\(S15P11A705-[0-9]+\): ' || \
            { echo "PR 제목 형식: {type}(S15P11A705-N): 설명"; exit 1; }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock -r requirements-dev.lock ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Compile check
        run: python -m compileall app tools

      # 통합 테스트는 Testcontainers로 pgvector를 러너 Docker에 띄운다.
      - name: Tests (pytest)
        run: pytest -q
