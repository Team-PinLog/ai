# 임시 샘플 맥락 (테스트 B/C 참고용)
#
# ⚠️ 내가 작성한 임시 데이터입니다. 프리셋을 알고 쓴 self-reference 편향이 있어
#    커버리지 수치는 "경향"으로만 해석합니다. 팀이 프리셋 안 보고 쓴 30~50개로
#    교체하면 유효한 측정이 됩니다.
#
# 규칙: 실제 저장 이유처럼 짧고 구어체. 여러 의미가 섞인 문장 포함(실제 입력이 그러함).
# expect: 눈으로 본 의도 프리셋 code(0~3개). Recall 참고용이며 정답 보증 아님.
# 프리셋 미매칭 의도(사각 확인용) 샘플은 expect: [].

samples:
