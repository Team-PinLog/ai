# PinLog Keyword Preset 초안
#
# AI가 Context를 분석해 매핑할 수 있는 사전 정의 Keyword 목록입니다.
# 이 파일이 프리셋 내용(메타데이터)의 소스이며, 서버 부트스트랩이 각 항목의
# 임베딩을 생성해 ai.keyword_preset에 적재합니다(embedding·embedding_profile·version은
# 여기서 다루지 않습니다). 적재 계약은 ai/docs/keyword-preset.md를 따릅니다.
#
# 필드
#   id          : 고정 정수 PK. 범주별 블록(1xx COMPANION / 2xx ACTIVITY / 3xx ATMOSPHERE / 4xx SITUATION)
#   code        : 불변 식별자(애플리케이션 상수와 1:1)
#   display_name: 화면 표시 문구
#   category    : COMPANION | ACTIVITY | ATMOSPHERE | SITUATION
#   description : 정의가 아니라 의미 범위. 동의어·인접 개념 포함
#   examples    : 실제 입력에 가까운 짧은 구어체. 키워드 단어가 없는 문장을 최소 하나 포함
#   visibility  : PUBLIC 기본. 개인 유추 소지가 있으면 PRIVATE_ONLY(사유 주석). BLOCKED는 MVP에 없음
#
# 지역·장소 카테고리(성수/카페 등)는 Keyword가 아니라 Place metadata 소관이므로 제외합니다.

presets:
  # ── COMPANION (동행자) ──────────────────────────────
  - id: 101
    code: WITH_FRIENDS
    display_name: 친구와
    category: COMPANION
    description: 친구나 지인과 함께한 자리. 편한 무리끼리의 모임을 포함
    examples:
      - "친구들이랑 오랜만에 모여서 수다 떨었다"
      - "동네 애들이랑 가볍게 한잔"
      - "여럿이 왁자지껄 떠들기 좋았음"
  - id: 102
    code: WITH_PARTNER
    display_name: 연인과
    category: COMPANION
    description: 연인과의 방문. 썸·커플 데이트 상황을 포함
    examples:
      - "여자친구랑 데이트하다 들름"
      - "둘이 오붓하게 있기 좋았다"
      - "기념일에 손잡고 왔던 곳"
  - id: 103
    code: WITH_FAMILY
    display_name: 가족과
    category: COMPANION
    description: 부모·형제 등 가족 동행. 명절이나 주말 가족 외출을 포함
    examples:
      - "부모님 모시고 저녁 먹었다"
      - "온 가족이 다 같이"
      - "어른들이랑 오기 편한 분위기"
  - id: 104
    code: WITH_COLLEAGUES
    display_name: 동료와
    category: COMPANION
    # PRIVATE_ONLY: 직장·소속을 유추할 수 있어 타인에게 공개하지 않는다.
    visibility: PRIVATE_ONLY
    description: 직장이나 팀 동료와의 자리. 점심·회식 상황을 포함
    examples:
      - "팀원들이랑 점심"
      - "회사 사람들이랑 저녁 회식"
      - "일 끝나고 다 같이 한잔"
  - id: 105
    code: WITH_KIDS
    display_name: 아이와
    category: COMPANION
    description: 아이를 동반한 방문. 유아 동반·노키즈 여부가 중요한 상황을 포함
    examples:
      - "애기 데리고 가기 좋았다"
      - "유아 의자 있어서 편함"
      - "아이들이 뛰어놀아도 눈치 안 보임"
  - id: 106
    code: ALONE
    display_name: 혼자
    category: COMPANION
    description: 혼자만의 시간. 혼밥·혼술·혼자 작업 상황을 포함
    examples:
      - "혼밥하기 딱 좋음"
      - "1인석이 있어서 편했다"
      - "누구 신경 안 쓰고 조용히 있다 옴"

  # ── ACTIVITY (활동) ─────────────────────────────────
  - id: 201
    code: COFFEE_CHAT
    display_name: 커피챗
    category: ACTIVITY
    description: 카페에서 대화를 나누는 방문. 티타임·수다 목적을 포함
    examples:
      - "커피 마시면서 두어 시간 얘기함"
      - "오랜만에 만나 근황 토크"
      - "앉아서 도란도란 얘기하기 좋았다"
  - id: 202
    code: MEAL
    display_name: 식사
    category: ACTIVITY
    description: 끼니를 해결하는 방문. 밥·점심·저녁 약속을 포함
    examples:
      - "점심 먹으러"
      - "제대로 한 끼 하고 옴"
      - "배고파서 들렀는데 든든했다"
  - id: 203
    code: DRINK
    display_name: 술자리
    category: ACTIVITY
    description: 음주를 곁들인 모임. 한잔·반주·회식을 포함
    examples:
      - "가볍게 맥주 한잔"
      - "안주가 좋아서 술이 술술"
      - "밤늦게까지 마시기 좋았음"
  - id: 204
    code: DESSERT
    display_name: 디저트
    category: ACTIVITY
    description: 케이크·빵 등 단것을 즐기는 방문. 브런치 후식을 포함
    examples:
      - "케이크 먹으러 일부러 감"
      - "빵이 진짜 맛있었다"
      - "달달한 거 당길 때 딱"
  - id: 205
    code: STUDY_WORK
    display_name: 작업
    category: ACTIVITY
    description: 공부나 노트북 작업을 하는 방문. 카공·미팅 준비를 포함
    examples:
      - "노트북 켜고 일하기 좋음"
      - "콘센트 많고 오래 있어도 눈치 안 봄"
      - "시험 기간에 여기서 살았다"
  - id: 206
    code: WALK
    display_name: 산책
    category: ACTIVITY
    description: 걸으며 둘러보는 활동. 마실·나들이·바람 쐬기를 포함
    examples:
      - "밥 먹고 근처 한 바퀴"
      - "천천히 걷기 좋은 길"
      - "바람 쐬러 나왔다가 들름"
  - id: 207
    code: SHOPPING
    display_name: 쇼핑
    category: ACTIVITY
    description: 물건을 구경하거나 사는 방문. 아이쇼핑·구매를 포함
    examples:
      - "구경만 하려다 결국 삼"
      - "물건 종류가 다양했다"
      - "선물 사러 들렀음"
  - id: 208
    code: EXHIBITION
    display_name: 전시관람
    category: ACTIVITY
    description: 전시나 공연 등을 보는 방문. 관람·감상 목적을 포함
    examples:
      - "전시 보러 감"
      - "작품 하나하나 천천히 봤다"
      - "볼거리가 많아서 시간 금방 감"

  # ── ATMOSPHERE (분위기) ─────────────────────────────
  - id: 301
    code: QUIET
    display_name: 조용한
    category: ATMOSPHERE
    description: 소음이 적고 차분한 공간. 한적하고 집중하기 좋은 느낌
    examples:
      - "사람이 별로 없어서 집중 잘 됐다"
      - "너무 조용해서 통화도 눈치 보임"
      - "차분하게 있다 왔음"
  - id: 302
    code: COZY
    display_name: 아늑한
    category: ATMOSPHERE
    description: 포근하고 편안한 분위기. 따뜻하고 오래 머물고 싶은 느낌
    examples:
      - "조명이 따뜻해서 포근했다"
      - "소파가 편해서 계속 앉아 있고 싶음"
      - "집처럼 편하게 있다 옴"
  - id: 303
    code: TRENDY
    display_name: 감성적인
    category: ATMOSPHERE
    description: 사진 찍기 좋고 분위기 있는 공간. 힙하고 트렌디한 느낌
    examples:
      - "어디를 찍어도 그림이 나옴"
      - "인테리어가 요즘 스타일"
      - "감성 터지는 곳"
  - id: 304
    code: LIVELY
    display_name: 활기찬
    category: ATMOSPHERE
    description: 붐비고 에너지 있는 분위기. 시끌벅적하고 북적이는 느낌
    examples:
      - "사람 많고 시끌시끌했다"
      - "북적북적 활기 넘침"
      - "왁자한 분위기라 신났음"
  - id: 305
    code: SPACIOUS
    display_name: 넓은
    category: ATMOSPHERE
    description: 자리가 여유롭고 트인 공간. 층고 높고 넉넉한 느낌
    examples:
      - "자리 간격이 넓어서 편했다"
      - "천장이 높아 답답하지 않음"
      - "단체로 가도 넉넉했다"
  - id: 306
    code: VIEW_GOOD
    display_name: 뷰맛집
    category: ATMOSPHERE
    description: 전망이나 경치가 좋은 곳. 야경·창가 뷰를 포함
    examples:
      - "창밖 경치가 끝내줬다"
      - "야경 보면서 한잔"
      - "탁 트인 게 속이 시원함"
  - id: 307
    code: RETRO
    display_name: 레트로
    category: ATMOSPHERE
    description: 옛 느낌이나 복고 분위기. 노포·빈티지 감성을 포함
    examples:
      - "옛날 감성이 물씬"
      - "오래된 노포 느낌"
      - "예전에 온 것 같은 정겨움"

  # ── SITUATION (상황) ────────────────────────────────
  - id: 401
    code: DATE_COURSE
    display_name: 데이트코스
    category: SITUATION
    description: 연인과 방문하기 좋은 자리. 코스로 이어가기 좋은 상황
    examples:
      - "데이트하기 딱 좋은 코스"
      - "둘이 오기 좋았음"
      - "다음에 또 같이 오고 싶다"
  - id: 402
    code: ANNIVERSARY
    display_name: 기념일
    category: SITUATION
    # PRIVATE_ONLY: 생일·기념일 등 개인의 특정 날짜를 유추할 수 있어 공개하지 않는다.
    visibility: PRIVATE_ONLY
    description: 생일이나 기념일 등 특별한 날의 방문. 축하 자리를 포함
    examples:
      - "생일이라 특별하게"
      - "기념일에 예약하고 감"
      - "중요한 날 챙기기 좋은 곳"
  - id: 403
    code: GATHERING
    display_name: 모임
    category: SITUATION
    description: 여럿이 모이는 자리. 단체 예약·동창회·정기 모임을 포함
    examples:
      - "단체로 예약하고 감"
      - "여럿이 모이기 좋았다"
      - "룸이 있어서 우리끼리 편함"
  - id: 404
    code: RAINY_DAY
    display_name: 비오는날
    category: SITUATION
    description: 비 올 때 가기 좋은 곳. 실내 위주로 시간 보내는 상황
    examples:
      - "궂은 날씨에 실내에서 시간 보내기 좋았다"
      - "비 와서 급하게 들어감"
      - "창밖에 비 오는 거 보기 좋았음"
  - id: 405
    code: QUICK_STOP
    display_name: 간단하게
    category: SITUATION
    description: 짧게 들르는 방문. 테이크아웃·잠깐 요기하는 상황
    examples:
      - "잠깐 들러서 포장만"
      - "후딱 먹고 나옴"
      - "시간 없어서 급하게 해결"
  - id: 406
    code: CELEBRATION
    display_name: 축하자리
    category: SITUATION
    description: 합격·승진 등을 축하하는 모임. 대접이 필요한 상황을 포함
    examples:
      - "합격 턱 쏘러"
      - "좋은 일 있어서 다 같이"
      - "제대로 축하해주고 싶어서 예약함"
